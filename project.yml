name: Mapping
options:
  bundleIdPrefix: com.shadow
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.35.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  Mapping:
    type: application
    platform: macOS
    sources:
      - path: Mapping
        excludes:
          - Resources/Info.plist
    info:
      path: Mapping/Resources/Info.plist
      properties:
        LSUIElement: true
    entitlements:
      path: Mapping/Mapping.entitlements
    settings:
      base:
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        PRODUCT_BUNDLE_IDENTIFIER: com.shadow.mapping
        PRODUCT_NAME: Mapping
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: Mapping/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Mapping/Mapping.entitlements
